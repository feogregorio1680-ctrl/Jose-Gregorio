<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industria Química J & J</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f2027;
    color: white;
}

/* HEADER */
header {
    background: black;
    text-align: center;
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
}

/* TITULOS */
h2 {
    text-align: center;
    margin: 40px 0 20px;
}

/* GALERÍA GRID */
.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* IMÁGENES */
.galeria img {
    width: 100%;
    border-radius: 15px;
    transition: 0.4s;
    cursor: pointer;
}

/* EFECTO HOVER */
.galeria img:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(0,255,200,0.5);
}

/* MODAL (ZOOM) */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    padding-top: 50px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
}

.modal img {
    margin: auto;
    display: block;
    max-width: 90%;
    border-radius: 10px;
}

/* BOTÓN CERRAR */
.cerrar {
    position: absolute;
    top: 20px;
    right: 30px;
    color: white;
    font-size: 35px;
    cursor: pointer;
}

/* CONTACTO */
.contacto {
    text-align: center;
    padding: 40px;
}

.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px 20px;
    border-radius: 50px;
    font-weight: bold;
}
</style>

</head>

<body>

<header>
INDUSTRIA QUÍMICA J & J E.I.R.L.
</header>

<h2>Galería de Productos</h2>

<div class="galeria">

<img src="1774681417094.jpg" onclick="abrir(this.src)">
<img src="1774681398247.jpg" onclick="abrir(this.src)">
<img src="1774681380210.jpg" onclick="abrir(this.src)">
<img src="1774681373300.jpg" onclick="abrir(this.src)">
<img src="1774681369117.jpg" onclick="abrir(this.src)">
<img src="1774681361944.jpg" onclick="abrir(this.src)">
<img src="1774681351987.jpg" onclick="abrir(this.src)">

</div>

<h2>Contacto</h2>

<div class="contacto">
📞 967 353 730 <br>
📞 955 100 006 <br>
📧 industriaquimicajj@gmail.com
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<span class="cerrar" onclick="cerrar()">&times;</span>
<img id="imgGrande">
</div>

<!-- BOTÓN WHATSAPP -->
<div class="whatsapp">
💬 WhatsApp
</div>

<script>
function abrir(src) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("imgGrande").src = src;
}

function cerrar() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
